<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>页面不存在 - 小蓝中转站使用文档</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        color: #172033;
        background: #f7fafc;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
      section {
        max-width: 560px;
        width: 100%;
        background: #fff;
        border: 1px solid #dfe7ef;
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 20px;
        line-height: 1.7;
        color: #4b5870;
      }
      a {
        color: #2563eb;
        font-weight: 600;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>页面不存在</h1>
        <p>链接可能已经移动，或路径输入有误。可以返回首页继续查看文档。</p>
        <a href="/">返回首页</a>
      </section>
    </main>
  </body>
</html>
